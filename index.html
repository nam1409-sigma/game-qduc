<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DA LO TIN NHAN</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #container { position: relative; width: 450px; height: 600px; background: #fdf0d5; border: 5px solid #3d2b1f; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 95vw; }
        .header-ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .ui-box { background: white; padding: 5px 12px; border-radius: 15px; border: 2px solid #3d2b1f; font-weight: bold; color: #3d2b1f; font-size: 13px; }
        canvas { display: block; border-radius: 10px; cursor: crosshair; }
        #dangerLine { position: absolute; top: 80px; left: 0; width: 100%; height: 2px; border-top: 3px dashed rgba(255, 71, 87, 0.6); pointer-events: none; z-index: 50; }
        #gameOverUI { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        button { padding: 12px 30px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 10px; }
        .btn-again { background: #2ed573; box-shadow: 0 4px 0 #209f55; }
    </style>
</head>
<body>

<div id="container">
    <div class="header-ui">
        <div class="ui-box">Điểm: <span id="scoreText">0</span></div>
        <div class="ui-box">Kỷ lục: <span id="highScoreText">0</span></div>
    </div>
    <div id="dangerLine"></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="gameOverUI">
        <h1>GAME OVER</h1>
        <p>Điểm của bạn: <b id="finalScore" style="color:#ffcc00">0</b></p>
        <button class="btn-again" onclick="location.reload()">CHƠI LẠI</button>
    </div>
</div>

<audio id="eagleSound" src="eagle.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<script>
    const IMGS_SRC = ['anhduy.jpg', 'ducanh.jpg', 'hieu.jpg', 'mabin.jpg', 'mhung.jpg', 'phuc.jpg', 'qduc.jpg', 'qduc2.jpg', 'tung.jpg'];
    const COLORS = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#eccc68', '#70a1ff', '#7bed9f', '#ff6b81', '#5352ed'];
    const CW = 450;
    const CH = 600;
    const DANGER_Y = 80;

    let score = 0;
    let highScore = localStorage.getItem('merge_highScore') || 0;
    document.getElementById('highScoreText').innerText = highScore;

    const initGame = () => {
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
        const engine = Engine.create();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const eagleSnd = document.getElementById('eagleSound');

        canvas.width = CW;
        canvas.height = CH;

        // Tải ảnh và xử lý lỗi
        const sprites = IMGS_SRC.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        // Tạo khung bao quanh
        Composite.add(engine.world, [
            Bodies.rectangle(CW/2, CH + 10, CW, 60, { isStatic: true }),
            Bodies.rectangle(-10, CH/2, 20, CH, { isStatic: true }),
            Bodies.rectangle(CW + 10, CH/2, 20, CH, { isStatic: true })
        ]);

        let curLvl = 0;
        let mouseX = CW/2;
        let canDrop = true;
        let isGameOver = false;

        const getRad = (lvl) => 18 + lvl * 7;

        // Xử lý di chuyển
        const handleMove = (e) => {
            if (isGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            mouseX = Math.max(25, Math.min(CW - 25, x));
        };

        const handleDrop = () => {
            if (!canDrop || isGameOver) return;
            
            const r = getRad(curLvl);
            const ball = Bodies.circle(mouseX, 40, r, {
                label: 'ball',
                level: curLvl,
                restitution: 0.3,
                spawnTime: Date.now()
            });

            Composite.add(engine.world, ball);
            canDrop = false;

            setTimeout(() => {
                if (!isGameOver) {
                    curLvl = Math.floor(Math.random() * 3);
                    canDrop = true;
                }
            }, 600);
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mousedown', handleDrop);
        window.addEventListener('touchstart', (e) => { handleMove(e); }, {passive: false});
        window.addEventListener('touchend', handleDrop);

        // Xử lý va chạm
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'ball' && bodyB.label === 'ball' && bodyA.level === bodyB.level && !bodyA.isMerging) {
                    
                    bodyA.isMerging = bodyB.isMerging = true;
                    if(eagleSnd) { eagleSnd.currentTime = 0; eagleSnd.play().catch(()=>{}); }

                    const nextLvl = bodyA.level + 1;
                    const pos = { x: (bodyA.position.x + bodyB.position.x)/2, y: (bodyA.position.y + bodyB.position.y)/2 };

                    if (nextLvl < IMGS_SRC.length) {
                        const newBall = Bodies.circle(pos.x, pos.y, getRad(nextLvl), {
                            label: 'ball', level: nextLvl, spawnTime: Date.now()
                        });
                        score += (nextLvl + 1) * 10;
                        setTimeout(() => {
                            Composite.remove(engine.world, [bodyA, bodyB]);
                            Composite.add(engine.world, newBall);
                        }, 10);
                    } else {
                        // Level cuối (tung.jpg) chạm nhau -> Nổ
                        score += 1000;
                        setTimeout(() => {
                            Composite.remove(engine.world, [bodyA, bodyB]);
                        }, 10);
                    }
                    document.getElementById('scoreText').innerText = score;
                }
            });
        });

        // Vòng lặp vẽ game
        (function render() {
            Engine.update(engine, 1000/60);
            ctx.clearRect(0, 0, CW, CH);

            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(body => {
                if (body.label === 'ball') {
                    const r = getRad(body.level);
                    
                    // Kiểm tra thua cuộc
                    if (!isGameOver && body.position.y < DANGER_Y && Date.now() - body.spawnTime > 3000) {
                        isGameOver = true;
                        endGame();
                    }

                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    
                    // Vẽ hình tròn
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI*2);
                    ctx.closePath();

                    // Nếu có ảnh thì vẽ ảnh, không thì vẽ màu
                    if (sprites[body.level] && sprites[body.level].complete && sprites[body.level].naturalWidth !== 0) {
                        ctx.clip();
                        ctx.drawImage(sprites[body.level], -r, -r, r*2, r*2);
                    } else {
                        ctx.fillStyle = COLORS[body.level % COLORS.length];
                        ctx.fill();
                        ctx.strokeStyle = "#333";
                        ctx.stroke();
                        ctx.fillStyle = "white";
                        ctx.textAlign = "center";
                        ctx.fillText(body.level, 0, 5);
                    }
                    ctx.restore();
                }
            });

            // Vẽ bóng nháp
            if (canDrop && !isGameOver) {
                const r = getRad(curLvl);
                ctx.globalAlpha = 0.5;
                if (sprites[curLvl] && sprites[curLvl].complete && sprites[curLvl].naturalWidth !== 0) {
                    ctx.drawImage(sprites[curLvl], mouseX - r, 40 - r, r*2, r*2);
                } else {
                    ctx.fillStyle = COLORS[curLvl];
                    ctx.beginPath();
                    ctx.arc(mouseX, 40, r, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            requestAnimationFrame(render);
        })();

        function endGame() {
            document.getElementById('finalScore').innerText = score;
            if (score > highScore) {
                localStorage.setItem('merge_highScore', score);
            }
            document.getElementById('gameOverUI').style.display = 'flex';
        }
    };

    // Đảm bảo Matter.js đã load xong
    window.onload = () => {
        if (typeof Matter !== 'undefined') {
            initGame();
        } else {
            alert("Không thể tải thư viện game. Vui lòng kiểm tra kết nối mạng!");
        }
    };
</script>
</body>
</html>
