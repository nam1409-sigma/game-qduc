<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameMerge_Eagle</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #container { position: relative; width: 400px; height: 600px; background: #fdf0d5; border: 5px solid #3d2b1f; border-radius: 15px; }
        .score { position: absolute; top: 10px; left: 10px; background: white; padding: 5px 15px; border-radius: 20px; border: 2px solid #3d2b1f; font-weight: bold; z-index: 100; }
        canvas { display: block; border-radius: 10px; }
        #msg { position: absolute; width: 100%; text-align: center; top: 50%; color: #3d2b1f; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="container">
    <div class="score">Điểm: <span id="scoreText">0</span></div>
    <div id="msg">ĐANG TẢI...</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<script>
    const IMGS = ['anhduy.jpg', 'ducanh.jpg', 'hieu.jpg', 'mabin.jpg', 'mhung.jpg', 'phuc.jpg', 'qduc.jpg', 'qduc2.jpg', 'tung.jpg'];
    
    const initGame = () => {
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
        const engine = Engine.create();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        const sprites = IMGS.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        const ground = Bodies.rectangle(200, 610, 400, 60, { isStatic: true });
        const left = Bodies.rectangle(-10, 300, 20, 600, { isStatic: true });
        const right = Bodies.rectangle(410, 300, 20, 600, { isStatic: true });
        Composite.add(engine.world, [ground, left, right]);

        let score = 0;
        let curLvl = 0;
        let mouseX = 200;
        let canDrop = true;

        const updatePosition = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
            mouseX = Math.max(30, Math.min(370, clientX - rect.left));
        };

        const handleDrop = (e) => {
            if (!canDrop) return;
            if (e && e.cancelable) e.preventDefault();

            const ball = Bodies.circle(mouseX, 50, 25 + curLvl * 10, {
                label: 'ball', level: curLvl, restitution: 0.4
            });
            Composite.add(engine.world, ball);
            canDrop = false;
            setTimeout(() => { curLvl = Math.floor(Math.random() * 3); canDrop = true; }, 800);
        };

        window.addEventListener('mousemove', updatePosition);
        window.addEventListener('mousedown', handleDrop);

        window.addEventListener('touchmove', (e) => {
            updatePosition(e);
            if (e.cancelable) e.preventDefault();
        }, { passive: false });
        
        window.addEventListener('touchstart', (e) => {
            updatePosition(e);
        }, { passive: false });
        
        window.addEventListener('touchend', handleDrop, { passive: false });

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'ball' && bodyB.label === 'ball' && bodyA.level === bodyB.level && !bodyA.isMerging) {
                    const nextLvl = bodyA.level + 1;
                    if (nextLvl < IMGS.length) {
                        bodyA.isMerging = bodyB.isMerging = true;
                        const newRadius = 25 + nextLvl * 10;
                        const newBall = Bodies.circle((bodyA.position.x + bodyB.position.x)/2, (bodyA.position.y + bodyB.position.y)/2, newRadius, {
                            label: 'ball', level: nextLvl
                        });
                        score += (nextLvl + 1) * 10;
                        document.getElementById('scoreText').innerText = score;
                        setTimeout(() => {
                            Composite.remove(engine.world, [bodyA, bodyB]);
                            Composite.add(engine.world, newBall);
                        }, 10);
                    }
                }
            });
        });

        (function update() {
            Engine.update(engine, 1000/60);
            ctx.clearRect(0, 0, 400, 600);
            
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'ball') {
                    const img = sprites[body.level];
                    const r = 25 + body.level * 10;
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI*2);
                    ctx.clip();
                    if (img.complete && img.naturalWidth > 0) {
                        ctx.drawImage(img, -r, -r, r*2, r*2);
                    } else {
                        ctx.fillStyle = "#ffcc00"; ctx.fill();
                    }
                    ctx.restore();
                }
            });

            if (canDrop) {
                const waitR = 25 + curLvl * 10;
                ctx.globalAlpha = 0.5;
                if (sprites[curLvl].complete && sprites[curLvl].naturalWidth > 0) {
                    ctx.drawImage(sprites[curLvl], mouseX - waitR, 50 - waitR, waitR * 2, waitR * 2);
                } else {
                    ctx.beginPath();
                    ctx.arc(mouseX, 50, waitR, 0, Math.PI*2);
                    ctx.fillStyle = "#ffcc00";
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            requestAnimationFrame(update);
        })();
    };

    setTimeout(() => {
        if (typeof Matter !== 'undefined') {
            initGame();
        } else {
            alert("Lỗi tải thư viện Vật lý!");
        }
    }, 1000);
</script>
</body>
</html>
