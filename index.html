<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameMerge_Eagle</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #container { position: relative; width: 400px; height: 600px; background: #fdf0d5; border: 5px solid #3d2b1f; border-radius: 15px; overflow: hidden; }
        .score { position: absolute; top: 10px; left: 10px; background: white; padding: 5px 15px; border-radius: 20px; border: 2px solid #3d2b1f; font-weight: bold; z-index: 100; color: #3d2b1f;}
        canvas { display: block; border-radius: 10px; }
        #dangerLine { position: absolute; top: 120px; left: 0; width: 100%; height: 2px; border-top: 3px dashed rgba(255, 71, 87, 0.6); pointer-events: none; z-index: 50; }
        #gameOverUI { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #gameOverUI h1 { color: #ff4757; font-size: 40px; margin: 0; text-shadow: 2px 2px 0 #000; }
        #gameOverUI button { padding: 12px 30px; font-size: 18px; font-weight: bold; background: #2ed573; color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #209f55; }
    </style>
</head>
<body>

<div id="container">
    <div class="score">Điểm: <span id="scoreText">0</span></div>
    <div id="dangerLine"></div>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOverUI">
        <h1>GAME OVER</h1>
        <p>Điểm của bạn: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">Chơi lại</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<script>
    // Danh sách 9 ảnh khớp chính xác với thư mục của bạn
    const IMGS = ['anhduy.jpg', 'ducanh.jpg', 'hieu.jpg', 'mabin.jpg', 'mhung.jpg', 'phuc.jpg', 'qduc.jpg', 'qduc2.jpg', 'tung.jpg'];
    const DANGER_Y = 120;
    
    const initGame = () => {
        const { Engine, Bodies, Composite, Events } = Matter;
        const engine = Engine.create();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        const sprites = IMGS.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        const ground = Bodies.rectangle(200, 610, 400, 60, { isStatic: true });
        const left = Bodies.rectangle(-10, 300, 20, 600, { isStatic: true });
        const right = Bodies.rectangle(410, 300, 20, 600, { isStatic: true });
        Composite.add(engine.world, [ground, left, right]);

        let score = 0, curLvl = 0, mouseX = 200, canDrop = true, isGameOver = false;

        const updatePos = (e) => {
            if (isGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches) ? e.touches[0].clientX : e.clientX;
            mouseX = Math.max(30, Math.min(370, clientX - rect.left));
        };

        const drop = (e) => {
            if (!canDrop || isGameOver) return;
            if (e && e.cancelable) e.preventDefault();
            const r = 25 + curLvl * 8; // Thu nhỏ độ tăng bán kính một chút để 9 cấp không quá to
            const ball = Bodies.circle(mouseX, 50, r, {
                label: 'ball', level: curLvl, restitution: 0.3, spawnTime: Date.now()
            });
            Composite.add(engine.world, ball);
            canDrop = false;
            setTimeout(() => { if(!isGameOver){ curLvl = Math.floor(Math.random() * 3); canDrop = true; } }, 800);
        };

        window.addEventListener('mousemove', updatePos);
        window.addEventListener('mousedown', drop);
        window.addEventListener('touchmove', (e) => { updatePos(e); if(e.cancelable) e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', drop, {passive: false});

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'ball' && bodyB.label === 'ball' && bodyA.level === bodyB.level && !bodyA.isMerging) {
                    const nextLvl = bodyA.level + 1;
                    if (nextLvl < IMGS.length) {
                        bodyA.isMerging = bodyB.isMerging = true;
                        const r = 25 + nextLvl * 8;
                        const newBall = Bodies.circle((bodyA.position.x + bodyB.position.x)/2, (bodyA.position.y + bodyB.position.y)/2, r, {
                            label: 'ball', level: nextLvl, spawnTime: Date.now()
                        });
                        score += (nextLvl + 1) * 10;
                        document.getElementById('scoreText').innerText = score;
                        setTimeout(() => { Composite.remove(engine.world, [bodyA, bodyB]); Composite.add(engine.world, newBall); }, 10);
                    }
                }
            });
        });

        (function update() {
            if (!isGameOver) Engine.update(engine, 1000/60);
            ctx.clearRect(0, 0, 400, 600);
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'ball') {
                    const r = 25 + body.level * 8;
                    // Kiểm tra tràn: ở trên vạch đỏ > 3 giây và gần như đứng yên
                    if (!isGameOver && (body.position.y - r) < DANGER_Y && Date.now() - body.spawnTime > 3000 && Math.abs(body.velocity.y) < 0.2) {
                        isGameOver = true;
                        document.getElementById('finalScore').innerText = score;
                        document.getElementById('gameOverUI').style.display = 'flex';
                    }
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.clip();
                    if (sprites[body.level] && sprites[body.level].complete) {
                        ctx.drawImage(sprites[body.level], -r, -r, r*2, r*2);
                    }
                    ctx.restore();
                }
            });
            if (canDrop && !isGameOver) {
                const r = 25 + curLvl * 8;
                ctx.globalAlpha = 0.5;
                if (sprites[curLvl] && sprites[curLvl].complete) {
                    ctx.drawImage(sprites[curLvl], mouseX - r, 50 - r, r*2, r*2);
                }
                ctx.globalAlpha = 1;
            }
            requestAnimationFrame(update);
        })();
    };

    window.onload = () => {
        setTimeout(() => { if (typeof Matter !== 'undefined') initGame(); }, 500);
    };
</script>
</body>
</html>
